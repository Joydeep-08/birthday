<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BirthdayLove 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose:#f9d0d8;--rose-mid:#f0a8b8;--rose-deep:#d4627e;
  --blush:#fce8ee;--cream:#fff8f5;--petal:#fdf0f5;
  --gold:#f7c66a;--text:#2d1520;--text-soft:#8a5a6a;
  --shadow:rgba(212,98,126,.18);--shadow-deep:rgba(212,98,126,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;min-height:100vh}
.hearts-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.heart-float{position:absolute;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.4}90%{opacity:.2}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;background:radial-gradient(ellipse 80% 80% at 50% 0%,#fff0f5 0%,var(--cream) 70%);position:relative;z-index:1}
.landing-pill{display:inline-flex;align-items:center;gap:8px;background:white;border:1px solid var(--rose-mid);border-radius:99px;padding:8px 20px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--rose-deep);font-weight:500;margin-bottom:36px}
.landing-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,9vw,68px);line-height:1.1;margin-bottom:20px;font-weight:400}
.landing-title em{color:var(--rose-deep);font-style:italic}
.landing-sub{font-size:15px;color:var(--text-soft);line-height:1.85;max-width:380px;margin:0 auto 44px}
.features-strip{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:40px;max-width:500px}
.feat-chip{background:white;border:1px solid var(--rose);border-radius:99px;padding:7px 16px;font-size:12px;color:var(--text-soft);display:flex;align-items:center;gap:6px}
.price-card{margin-top:40px;background:white;border:1.5px solid var(--rose);border-radius:24px;padding:24px 36px;text-align:center}
.price-big{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--rose-deep);line-height:1}
.price-strike{font-size:16px;color:var(--text-soft);text-decoration:line-through;margin-left:8px}
.price-sub{font-size:12px;color:var(--text-soft);margin-top:6px}
.price-green{font-size:12px;color:#5aad5a;margin-top:4px}
/* BUTTONS */
.btn-primary{background:var(--rose-deep);color:white;border:none;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:16px 44px;cursor:pointer;box-shadow:0 8px 28px var(--shadow);transition:all .25s ease;display:inline-block}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 40px var(--shadow-deep)}
.btn-secondary{background:white;color:var(--rose-deep);border:1.5px solid var(--rose-mid);border-radius:99px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:13px 32px;cursor:pointer;transition:all .25s ease}
.btn-secondary:hover{background:var(--blush)}
.btn-back{background:none;border:1.5px solid var(--rose);border-radius:99px;padding:13px 20px;color:var(--text-soft);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;transition:all .2s}
.btn-back:hover{background:var(--blush)}
/* BUILDER */
.builder-header{background:rgba(255,248,245,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--rose);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.builder-logo{font-family:'Pinyon Script',cursive;font-size:28px;color:var(--rose-deep);flex:1}
.step-dots{display:flex;gap:6px}
.step-dot{width:8px;height:8px;border-radius:99px;background:var(--rose);transition:all .3s}
.step-dot.active{background:var(--rose-deep);width:24px}
.builder-body{padding:28px 24px;max-width:520px;margin:0 auto}
.step-label{font-size:10px;font-weight:500;letter-spacing:2px;color:var(--rose-deep);text-transform:uppercase;margin-bottom:8px}
.step-heading{font-family:'Cormorant Garamond',serif;font-size:28px;line-height:1.25;margin-bottom:8px}
.step-sub{font-size:13px;color:var(--text-soft);margin-bottom:28px;line-height:1.7}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text-soft);margin-bottom:7px;letter-spacing:.3px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--rose);border-radius:14px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;background:white;color:var(--text);transition:border-color .2s;outline:none;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--rose-deep)}
.field textarea{height:130px;line-height:1.65}
.step-nav{display:flex;gap:12px;margin-top:32px;padding-bottom:40px}
.step-nav .btn-primary{flex:1}
/* COUPON */
.coupon-row{display:flex;gap:8px;margin-top:8px}
.coupon-row input{flex:1}
.coupon-apply-btn{background:var(--blush);border:1.5px solid var(--rose-mid);border-radius:12px;padding:0 18px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--rose-deep);cursor:pointer;white-space:nowrap;transition:all .2s}
.coupon-apply-btn:hover{background:var(--rose);color:white}
.coupon-msg{font-size:12px;margin-top:6px;padding:6px 12px;border-radius:8px}
.coupon-ok{background:#edfaed;color:#2e7d32}
.coupon-err{background:#fdecea;color:#c62828}
/* THEME / MUSIC */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.theme-card{border:2px solid var(--rose);border-radius:16px;padding:14px;cursor:pointer;transition:all .2s;background:white;text-align:center}
.theme-card.selected{border-color:var(--rose-deep);background:var(--blush)}
.theme-icon{font-size:26px;margin-bottom:5px}
.theme-name{font-size:13px;font-weight:500}
.theme-desc{font-size:11px;color:var(--text-soft);margin-top:2px}
.music-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.music-item{display:flex;align-items:center;gap:12px;background:white;border:1.5px solid var(--rose);border-radius:14px;padding:12px 16px;cursor:pointer;transition:all .2s}
.music-item.selected{border-color:var(--rose-deep);background:var(--blush)}
.music-check{font-size:16px;opacity:0;transition:opacity .2s;color:var(--rose-deep)}
.music-item.selected .music-check{opacity:1}
.balloon-msg-group{background:var(--petal);border:1px solid var(--rose);border-radius:16px;padding:18px;margin-bottom:16px}
.balloon-msg-group h4{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--rose-deep);margin-bottom:12px}
/* PREVIEW */
.preview-toolbar{background:rgba(255,248,245,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--rose);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.preview-label{flex:1;font-size:13px;color:var(--text-soft);display:flex;align-items:center;gap:8px}
.preview-badge{background:var(--blush);color:var(--rose-deep);font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;letter-spacing:.5px}
.preview-phone{max-width:420px;margin:20px auto 0;background:white;border-radius:28px;box-shadow:0 24px 64px var(--shadow);overflow:hidden;border:1px solid var(--rose)}
.preview-actions{padding:24px;max-width:480px;margin:0 auto}
.preview-note{background:white;border:1px solid var(--rose);border-radius:16px;padding:16px 18px;font-size:13px;color:var(--text-soft);line-height:1.7;margin-bottom:18px}
.price-badge{text-align:center;margin-bottom:18px}
.price-amount{font-family:'Cormorant Garamond',serif;font-size:44px;color:var(--rose-deep)}
.price-inc{font-size:12px;color:#5aad5a;margin-top:4px}
/* BIRTHDAY SITE */
.bday-hero{padding:52px 28px 40px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(165deg,#fff0f5 0%,#fce8ee 55%,#f8e8f8 100%)}
.bday-to-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:12px}
.bday-name{font-family:'Pinyon Script',cursive;font-size:52px;color:var(--rose-deep);line-height:1.15;margin-bottom:8px}
.bday-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--text-soft)}
.sparkle-row{display:flex;justify-content:center;gap:8px;margin-top:14px;font-size:18px}
.spark{display:inline-block;animation:sparkPulse 1.5s ease-in-out infinite}
.spark:nth-child(2){animation-delay:.3s}.spark:nth-child(3){animation-delay:.6s}
@keyframes sparkPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.3);opacity:1}}
/* CAKE */
.cake-section{padding:28px 24px;text-align:center}
.cake-wrap{display:flex;justify-content:center;margin-bottom:16px}
.cake-svg{width:130px;height:130px;cursor:pointer;transition:transform .2s;filter:drop-shadow(0 8px 16px rgba(212,98,126,.2))}
.cake-svg:hover{transform:scale(1.05)}
.candle-flame{transform-origin:60px 34px;animation:flicker .8s ease-in-out infinite alternate}
@keyframes flicker{0%{transform:scaleX(1) scaleY(1) rotate(-2deg);opacity:1}50%{transform:scaleX(.8) scaleY(1.15) rotate(2deg);opacity:.9}100%{transform:scaleX(1.1) scaleY(.9) rotate(-1deg);opacity:1}}
.cake-hint{font-size:13px;color:var(--text-soft);animation:pulseBorder 2s ease-in-out infinite;background:none;border:1.5px solid var(--rose-mid);border-radius:99px;padding:10px 24px;cursor:pointer;font-family:'DM Sans',sans-serif}
@keyframes pulseBorder{0%,100%{box-shadow:0 0 0 0 rgba(212,98,126,0)}50%{box-shadow:0 0 0 6px rgba(212,98,126,.15)}}
.blownout-msg{font-family:'Pinyon Script',cursive;font-size:26px;color:var(--rose-deep);margin-top:12px;animation:fadeSlide .6s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* LETTER */
.bday-letter{padding:32px 28px;background:white;border-top:1px solid var(--rose)}
.letter-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--rose-deep);margin-bottom:14px;text-align:center}
.letter-text{font-family:'Cormorant Garamond',serif;font-size:16px;line-height:2;color:var(--text);white-space:pre-wrap}
.letter-sign{font-family:'Pinyon Script',cursive;font-size:30px;color:var(--rose-deep);margin-top:20px;text-align:right}
/* BALLOONS */
.balloon-section{padding:36px 24px;background:#fff8fc;border-top:1px solid var(--rose)}
.balloon-section-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--rose-deep);text-align:center;margin-bottom:6px}
.balloon-section-sub{font-size:13px;color:var(--text-soft);text-align:center;margin-bottom:32px}
.balloon-arena{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;min-height:200px}
.balloon-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;transition:transform .15s;user-select:none;width:86px}
.balloon-wrap:hover:not(.popped){transform:scale(1.1) translateY(-6px)}
.balloon-string-emoji{font-size:15px;margin-bottom:2px;opacity:.7}
/* POLAROID CARD */
.balloon-card-wrap{width:210px;background:white;border-radius:18px;border:1.5px solid var(--rose);overflow:hidden;box-shadow:0 16px 48px var(--shadow);animation:popCardIn .5s cubic-bezier(.34,1.56,.64,1);margin:0 auto}
@keyframes popCardIn{from{opacity:0;transform:scale(.65) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.balloon-card-media{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#fce8ee,#f8e8f8);display:flex;align-items:center;justify-content:center;font-size:60px;overflow:hidden;position:relative}
.balloon-card-media img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.balloon-card-frame{padding:14px 16px 8px;background:white}
.balloon-card-msg{font-family:'Cormorant Garamond',serif;font-size:14px;line-height:1.65;color:var(--text);text-align:center;font-style:italic;margin-bottom:6px}
.balloon-card-from{font-size:11px;color:var(--text-soft);text-align:right;padding-bottom:6px;font-family:'Pinyon Script',cursive;font-size:18px;color:var(--rose-deep)}
.pop-burst{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:38px;animation:popBurst .55s ease forwards;pointer-events:none;z-index:10}
@keyframes popBurst{0%{opacity:1;transform:translateX(-50%) scale(.3)}40%{opacity:1;transform:translateX(-50%) scale(2)}100%{opacity:0;transform:translateX(-50%) scale(2.6)}}
.all-popped{width:100%;text-align:center;padding:24px;font-family:'Pinyon Script',cursive;font-size:28px;color:var(--rose-deep);animation:fadeSlide .6s ease}
/* CONFETTI particles inside balloon arena */
.balloon-confetti{position:absolute;pointer-events:none;font-size:16px;animation:balloonConfetti 1s ease forwards}
@keyframes balloonConfetti{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
/* WISHES */
.wishes-section{padding:32px 24px;background:var(--petal);border-top:1px solid var(--rose)}
.wishes-title{font-family:'Cormorant Garamond',serif;font-size:22px;text-align:center;margin-bottom:20px}
.wish-card{background:white;border:1px solid var(--rose);border-radius:16px;padding:18px 20px;display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;opacity:0;transform:translateY(10px);transition:all .5s ease}
.wish-card.revealed{opacity:1;transform:translateY(0)}
.wish-card:nth-child(2){transition-delay:.15s}.wish-card:nth-child(3){transition-delay:.3s}
.wish-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.wish-text{font-size:14px;line-height:1.7;color:var(--text)}
/* FOOTER */
.bday-footer{padding:40px 28px;text-align:center;background:white;border-top:1px solid var(--rose)}
.footer-heart{font-size:38px;margin-bottom:14px;display:block;animation:heartbeat 1.5s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.footer-text{font-family:'Pinyon Script',cursive;font-size:26px;color:var(--rose-deep);line-height:1.7}
/* MUSIC FAB */
.music-fab{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--rose-deep);color:white;border:none;border-radius:99px;width:48px;height:48px;font-size:18px;cursor:pointer;box-shadow:0 6px 20px var(--shadow);transition:all .2s;display:flex;align-items:center;justify-content:center}
.music-fab:hover{transform:scale(1.08)}
/* PAYMENT */
.payment-wrap{min-height:100vh;background:var(--petal);padding:32px 24px;position:relative;z-index:1}
.payment-body{max-width:480px;margin:0 auto}
.payment-header{text-align:center;margin-bottom:28px}
.payment-header h2{font-family:'Cormorant Garamond',serif;font-size:30px;margin-bottom:8px}
.payment-header p{font-size:13px;color:var(--text-soft)}
.order-summary{background:white;border-radius:20px;padding:20px;border:1px solid var(--rose);margin-bottom:20px}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--rose);font-size:13px}
.order-row:last-child{border-bottom:none}
.order-row.total{font-weight:600;font-size:15px;color:var(--rose-deep)}
.order-label{color:var(--text-soft)}
.order-discount{color:#2e7d32;font-size:12px}
.pay-btn{width:100%;background:var(--rose-deep);color:white;border:none;border-radius:16px;padding:18px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 8px 24px var(--shadow);transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px}
.pay-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 14px 36px var(--shadow-deep)}
.pay-btn:disabled{opacity:.65;cursor:not-allowed}
.pay-secure{text-align:center;font-size:11px;color:var(--text-soft);margin-top:10px}
/* SUCCESS */
.success-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;background:var(--petal);position:relative;z-index:1}
.success-icon{font-size:72px;margin-bottom:24px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.success-title{font-family:'Cormorant Garamond',serif;font-size:36px;margin-bottom:12px}
.success-sub{font-size:14px;color:var(--text-soft);max-width:320px;margin:0 auto 28px;line-height:1.8}
.link-box{background:white;border:2px solid var(--rose);border-radius:16px;padding:16px 20px;font-size:12px;word-break:break-all;color:var(--rose-deep);margin-bottom:14px;width:100%;max-width:380px;cursor:pointer;transition:all .2s;text-align:left}
.link-box:hover{border-color:var(--rose-deep);background:var(--blush)}
.share-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.share-btn{background:white;border:1.5px solid var(--rose);border-radius:99px;padding:10px 20px;font-size:12px;color:var(--text-soft);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.share-btn:hover{background:var(--blush)}
/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;z-index:9999;pointer-events:none;animation:confettiDrop linear forwards}
@keyframes confettiDrop{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media(max-width:480px){.preview-phone{border-radius:0;margin:0}.bday-name{font-size:40px}.landing-title{font-size:36px}.balloon-card-wrap{width:185px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--rose);border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── CONFIG ── Replace with your actual Razorpay key ──
var RAZORPAY_KEY = 'rzp_test_YOURKEYHERE';

// GIF files — place gif1.gif, gif2.gif, gif3.gif, gif4.gif in same folder as index.html
var GIF_FILES = ['gif1.webp','gif2.webp','gif3.webp','gif4.webp'];
var GIF_FALLBACK_EMOJI = ['🌸','💫','🎉','💕'];

var COUPONS = {
  'FREELOVE':{ discount:99, label:'100% off — Free!', free:true },
  'LOVE1':   { discount:98, label:'₹98 off — pay just ₹1', free:false },
  'LOVE59':  { discount:40, label:'₹40 off — pay ₹59', free:false }
};

var BALLOON_COLORS=['#f9d0d8','#c8b3f5','#b3d9f5','#f5c8b3'];
var BALLOON_STROKES=['#d4627e','#8b6fbe','#3a8fbe','#d47e3e'];
var CONFETTI_COLORS=['#f9d0d8','#d4627e','#c8b3f5','#f7c66a','#b3d9f5','#fce8ee'];

function randId(){return 'bday-'+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);}

function launchConfetti(){
  for(var i=0;i<70;i++){
    (function(delay){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        var size=6+Math.random()*8;
        el.style.cssText='left:'+Math.random()*100+'vw;background:'+CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]+';animation-duration:'+(1.5+Math.random()*2.5)+'s;animation-delay:'+Math.random()*.5+'s;width:'+size+'px;height:'+size+'px;border-radius:'+(Math.random()>.5?'50%':'3px')+';';
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},4000);
      },delay);
    })(i*30);
  }
}

function playPop(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(700,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+0.18);
    g.gain.setValueAtTime(0.6,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.22);
  }catch(e){}
}

function makeHeartsBackground(){
  var symbols=['❤️','💕','💗','🌸','✨','💫','🌺','💖','🌷','⭐'];
  var bg=document.createElement('div');bg.className='hearts-bg';
  for(var i=0;i<18;i++){
    var s=document.createElement('span');
    s.className='heart-float';
    s.style.cssText='left:'+Math.random()*100+'%;animation-duration:'+(8+Math.random()*10)+'s;animation-delay:'+Math.random()*14+'s;font-size:'+(10+Math.random()*10)+'px';
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    bg.appendChild(s);
  }
  return bg;
}

function makeBalloonSVG(color,stroke){
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 80 110');
  svg.setAttribute('width','80');svg.setAttribute('height','110');

  +'<div class="wishes-section" id="wish-sec"><div class="wishes-title">A Bouquet of Wishes for You 🌸</div>'

  // Cake

  var ckMsg=container.querySelector('#ck-msg');

    if(!blown){
      ckMsg.innerHTML='<button class="cake-hint">🕯️ Tap to blow the candle</button>';
      ckMsg.querySelector('button').onclick=blowCandle;
    } else {
      ckMsg.innerHTML='<div class="blownout-msg">Make a wish, '+name+'! 🎉</div>';
    }
  }
  function blowCandle(){if(blown)return;blown=true;renderCake();launchConfetti();}
  renderCake();

  // Balloons
  var arena=container.querySelector('#b-arena');
  function renderBalloons(){
    arena.innerHTML='';
    var allPopped=popped.every(function(p){return p;});
    for(var i=0;i<4;i++){

        // Polaroid card
        var card=document.createElement('div');
        card.className='balloon-card-wrap';
        var mediaDiv=document.createElement('div');mediaDiv.className='balloon-card-media';
        mediaDiv.textContent=GIF_FALLBACK_EMOJI[i];
        // Try loading GIF
        (function(idx,mdiv){
          var img=new Image();
          img.onload=function(){
            mdiv.textContent='';
            img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0';
            mdiv.style.position='relative';
            mdiv.appendChild(img);
          };
          img.onerror=function(){};
          img.src=GIF_FILES[idx];
        })(i,mediaDiv);
        var frameDiv=document.createElement('div');frameDiv.className='balloon-card-frame';
        frameDiv.innerHTML='<div class="balloon-card-msg">'+balloonMsgs[i]+'</div><div class="balloon-card-from">'+sender+'</div>';
        card.appendChild(mediaDiv);card.appendChild(frameDiv);
        arena.appendChild(card);
      } else {
        var wrap=document.createElement('div');wrap.className='balloon-wrap';
        var emoji=document.createElement('div');emoji.className='balloon-string-emoji';
        emoji.textContent=['💕','✨','🌸','🎀'][i];
        wrap.appendChild(emoji);
        wrap.appendChild(makeBalloonSVG(BALLOON_COLORS[i],BALLOON_STROKES[i]));
        (function(idx,w){
          w.addEventListener('click',function(){
            if(popped[idx])return;
            playPop();
            var burst=document.createElement('div');burst.className='pop-burst';burst.textContent='💥';
            w.appendChild(burst);
            setTimeout(function(){
              popped[idx]=true;
              renderBalloons();
              if(popped.every(function(p){return p;})){
                setTimeout(launchConfetti,200);
                var all=document.createElement('div');all.className='all-popped';
                all.textContent='You found all the love! 🎉';

              }
            },420);
          });

        arena.appendChild(wrap);

    }

  renderBalloons();

  // Wishes on scroll
  var wishSec=container.querySelector('#wish-sec');
  if(wishSec&&window.IntersectionObserver){
    var obs=new IntersectionObserver(function(entries){
      if(entries[0].isIntersecting){

    obs.observe(wishSec);
  }

  // Music fab

    var fab=container.querySelector('#mfab');
    if(fab){fab.addEventListener('click',function(){fab.textContent=fab.textContent==='🎵'?'🔇':'🎵';});}
  }

  }
  if(window.Razorpay){openRzp();return;}
  var s=document.createElement('script');s.src='https://checkout.razorpay.com/v1/checkout.js';
  s.onload=openRzp;s.onerror=function(){setTimeout(activateSite,1200);};
  document.head.appendChild(s);
}

function renderSuccess(){
  var wrap=document.createElement('div');wrap.className='success-wrap';
  var link='https://birthdaylove.app/'+state.siteId;
  wrap.innerHTML='<div class="success-icon">🎉</div>'
    +'<h1 class="success-title">Your surprise is ready!</h1>'
    +'<p class="success-sub">Share this link with '+(state.data.recipientName||'them')+' and watch the magic happen. The link is active forever! 🌸</p>'
    +'<div class="link-box" id="lnk">🔗 '+link+'</div>'
    +'<div id="cp-ok" style="font-size:12px;color:#5aad5a;margin-bottom:8px;display:none">✓ Copied!</div>'
    +'<button class="btn-primary" id="cp-btn">📋 Copy Link</button>'
    +'<div class="share-row">'
    +'<button class="share-btn" id="wa">💬 WhatsApp</button>'
    +'<button class="share-btn" id="tg">✈️ Telegram</button>'
    +'<button class="share-btn" id="em">📧 Email</button>'
    +'</div>'
    +'<div style="margin-top:28px;padding:16px 20px;background:white;border-radius:16px;border:1px solid var(--rose);max-width:360px;font-size:13px;color:var(--text-soft);line-height:1.7"><strong style="color:var(--text)">How it works:</strong><br/>When '+(state.data.recipientName||'they')+' opens your link, they see only the birthday experience — no payment page, pure magic. ✨</div>'
    +'<button class="btn-secondary" style="margin-top:20px" id="pv-rec">👁 Preview recipient view</button>';
  function copyIt(){
    navigator.clipboard.writeText(link).then(function(){
      wrap.querySelector('#cp-ok').style.display='block';
      wrap.querySelector('#cp-btn').textContent='✓ Copied!';
      setTimeout(function(){wrap.querySelector('#cp-ok').style.display='none';wrap.querySelector('#cp-btn').textContent='📋 Copy Link';},2500);
    });
  }
  wrap.querySelector('#lnk').addEventListener('click',copyIt);
  wrap.querySelector('#cp-btn').addEventListener('click',copyIt);
  wrap.querySelector('#wa').addEventListener('click',function(){window.open('https://wa.me/?text='+encodeURIComponent('I made something magical for your birthday! 🎉 Open this: '+link));});
  wrap.querySelector('#tg').addEventListener('click',function(){window.open('https://t.me/share/url?url='+encodeURIComponent(link)+'&text='+encodeURIComponent('I made something magical for your birthday! 🎉'));});
  wrap.querySelector('#em').addEventListener('click',function(){window.open('mailto:?subject=Your Birthday Surprise!&body='+encodeURIComponent('I made something magical just for you 🎉 Open this: '+link));});
  wrap.querySelector('#pv-rec').addEventListener('click',function(){setState({page:'recipient'});});
  return wrap;
}

function renderRecipient(){
  var wrap=document.createElement('div');
  wrap.style='position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 60px var(--shadow)';
  buildBirthdaySite(state.data,wrap,false);
  return wrap;
}

render();
</script>
</body>
</html>
